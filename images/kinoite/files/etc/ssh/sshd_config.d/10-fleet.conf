# Look up authorized keys in an image-baked location (/etc is part of the image;
# /home is not), in addition to the user's own ~/.ssh/authorized_keys.
AuthorizedKeysFile /etc/ssh/authorized_keys.d/%u .ssh/authorized_keys

# Exempt the backbone from per-source connection penalties. The gateway drives every
# box over SSH and the dashboard polls continuously, so it opens many short-lived
# connections from one source IP. OpenSSH 9.8+ enables PerSourcePenalties by DEFAULT,
# which then throttles and RESETS the gateway's connections at the key-exchange stage
# ("kex_exchange_identification: Connection reset by peer") for a cooldown window —
# surfacing in the dashboard as flaky / "OS: unknown" reads that come and go. The
# fleet LAN (10.10.0.0/24) is the trusted network the gateway drives boxes over, so
# exempting it is safe and removes the mechanism. See dashboard/app.py _ssh_base
# (ControlMaster reuse) for the complementary client-side fix.
PerSourcePenaltyExemptList 10.10.0.0/24
